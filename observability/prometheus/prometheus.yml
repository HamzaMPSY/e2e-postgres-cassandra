global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: omnicare-metrics-exporter
    static_configs:
      - targets:
          - metrics-exporter:8080

  - job_name: omnicare-transformer
    static_configs:
      - targets:
          - transformer:8090
