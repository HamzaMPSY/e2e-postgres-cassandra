groups:
  - name: omnicare-cdc
    rules:
      - alert: OmniCareKafkaConnectDown
        expr: omnicare_kafka_connect_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: Kafka Connect REST API is unavailable
          description: The metrics exporter cannot reach Kafka Connect at the configured CONNECT_URL.

      - alert: OmniCareConnectorNotRunning
        expr: max by (connector) (omnicare_connector_running) == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Debezium connector is not running
          description: Connector {{ $labels.connector }} is not reporting RUNNING.

      - alert: OmniCareConnectorTaskNotRunning
        expr: max by (connector, task) (omnicare_connector_task_running) == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Debezium connector task is not running
          description: Connector {{ $labels.connector }} task {{ $labels.task }} is not reporting RUNNING.

      - alert: OmniCareDashboardApiDown
        expr: omnicare_dashboard_api_up == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: Dashboard API is unavailable
          description: The metrics exporter cannot read the dashboard API snapshot.

      - alert: OmniCareDashboardSnapshotStale
        expr: (time() - omnicare_pipeline_snapshot_generated_at_seconds > 300) and on() omnicare_dashboard_api_up == 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Dashboard data snapshot is stale
          description: The dashboard API is reachable but the exported generatedAt timestamp is older than five minutes.

      - alert: OmniCareNoOrderLineFacts
        expr: omnicare_pipeline_summary_value{metric="orderLines"} == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: No order-line facts are visible
          description: The dashboard summary reports zero order lines, which usually means CDC replay has not populated Cassandra.

      - alert: OmniCareDataQualityGateFailed
        expr: omnicare_data_quality_overall_status{status="fail"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: Dashboard data quality gate failed
          description: At least one dashboard data quality check is failing. Inspect omnicare_data_quality_check_passed for the failing check.

      - alert: OmniCareDataQualityGateWarning
        expr: omnicare_data_quality_overall_status{status="warn"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Dashboard data quality gate is warning
          description: Dashboard quality checks are warning, usually because freshness or completeness cannot be proven.

      - alert: OmniCareTransformerDown
        expr: up{job="omnicare-transformer"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Transformer metrics endpoint is unavailable
          description: Prometheus cannot scrape the transformer metrics endpoint.

      - alert: OmniCareTransformerDlqRecords
        expr: increase(omnicare_transformer_dlq_records_total[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Transformer is publishing DLQ records
          description: DLQ records increased for source topic {{ $labels.source_topic }}.

      - alert: OmniCareTransformerValidationRejects
        expr: increase(omnicare_transformer_validation_rejects_total[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Transformer is quarantining invalid CDC rows
          description: Validation rejects increased for {{ $labels.target_table }} with error {{ $labels.error_code }}.

      - alert: OmniCareDlqSpike
        expr: increase(omnicare_quality_dlq_records_total[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Quality exporter detected DLQ growth
          description: DLQ records increased according to the project metrics exporter.

      - alert: OmniCareQuarantineSpike
        expr: increase(omnicare_quality_quarantine_records_total[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Quality exporter detected quarantine growth
          description: Transformer validation rejects increased according to the project metrics exporter.

      - alert: OmniCareCassandraWriteLatencyHigh
        expr: rate(omnicare_transformer_cassandra_write_latency_seconds_sum[5m]) / rate(omnicare_transformer_cassandra_write_latency_seconds_count[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Cassandra write latency is high
          description: Average transformer Cassandra write latency is above one second over five minutes.

      - alert: OmniCareKafkaExporterDown
        expr: up{job="kafka-exporter"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Kafka exporter is unavailable
          description: Prometheus cannot scrape Kafka exporter, so consumer lag is invisible.

      - alert: OmniCareTransformerConsumerLagHigh
        expr: sum by (consumergroup) (kafka_consumergroup_lag{consumergroup="omnicare-cdc-transformer"}) > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Transformer consumer lag is high
          description: Consumer group {{ $labels.consumergroup }} is more than 1000 records behind.

      - alert: OmniCareDebeziumJmxDown
        expr: omnicare_debezium_jmx_up == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Debezium JMX metrics are unavailable
          description: Jolokia/JMX metrics cannot be read from Kafka Connect.

      - alert: OmniCareDebeziumSourceLagHigh
        expr: max by (connector) (omnicare_debezium_source_lag_milliseconds) > 60000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Debezium source lag is high
          description: Connector {{ $labels.connector }} reports source lag above 60 seconds.
