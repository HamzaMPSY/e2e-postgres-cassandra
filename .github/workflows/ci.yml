name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run-live-e2e:
        description: "Run the live Podman E2E demo on a runner that has Podman, jq, and envsubst."
        required: false
        type: boolean
        default: false
      live-runner-label:
        description: "Runner label for the live Podman E2E job."
        required: false
        type: string
        default: "self-hosted"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate connector JSON
        run: |
          find connectors -name '*.json' -print -exec python -m json.tool {} \; >/dev/null

      - name: Validate CDC config
        run: python tools/validate_config.py

      - name: Validate security hardening policy
        run: python tools/security_check.py

      - name: Validate deployment templates
        run: python tools/validate_deployments.py

      - name: Validate CDC data contracts
        run: python tools/validate_contracts.py

      - name: Run transformer tests
        working-directory: transformer
        run: PYTHONPATH=src python -m unittest

      - name: Run generator tests
        working-directory: generator
        run: PYTHONPATH=src python -m unittest

      - name: Run dashboard tests
        working-directory: dashboard
        run: PYTHONPATH=app python -m unittest discover -s tests

      - name: Run observability exporter tests
        run: PYTHONPATH=observability/exporter python -m unittest discover -s observability/exporter/tests

      - name: Run config validator tests
        run: PYTHONPATH=tools python -m unittest discover -s tools/tests

      - name: Validate shell scripts
        run: bash -n scripts/cdc-replay.sh scripts/request-resnapshot.sh scripts/connect-connector.sh scripts/register-connectors.sh scripts/demo-e2e.sh

      - name: Validate Grafana dashboard JSON
        run: python -m json.tool observability/grafana/dashboards/omnicare-cdc.json >/dev/null

      - name: Compile Python modules
        run: |
          python -m py_compile transformer/src/omnicare_cdc/*.py
          python -m py_compile generator/src/omnicare_generator/*.py
          python -m py_compile dashboard/app/server.py
          python -m py_compile dashboard/app/quality.py
          python -m py_compile observability/exporter/server.py
          python -m py_compile tools/validate_config.py
          python -m py_compile tools/security_check.py
          python -m py_compile tools/validate_deployments.py
          python -m py_compile tools/validate_contracts.py
          python -m py_compile tools/quality_gate.py

  e2e-smoke:
    name: E2E demo dry-run smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate E2E demo command path
        run: >
          scripts/demo-e2e.sh
          --dry-run
          --env-file .env.example
          --max-events 2
          --rate-per-second 1
          --transformer-max-messages 10
          --timeout-seconds 30

  e2e-live:
    name: Live Podman E2E demo
    if: ${{ github.event_name == 'workflow_dispatch' && inputs['run-live-e2e'] }}
    runs-on: ${{ inputs['live-runner-label'] }}
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare local environment
        run: cp .env.example .env

      - name: Install generator package
        run: python -m pip install -e generator

      - name: Run live E2E demo
        run: >
          scripts/demo-e2e.sh
          --env-file .env
          --max-events 10
          --rate-per-second 2
          --transformer-max-messages 200
          --timeout-seconds 300

      - name: Upload demo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-e2e-report
          path: artifacts/demo-report.json
          if-no-files-found: ignore
