name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate connector JSON
        run: |
          find connectors -name '*.json' -print -exec python -m json.tool {} \; >/dev/null

      - name: Validate CDC config
        run: python tools/validate_config.py

      - name: Validate security hardening policy
        run: python tools/security_check.py

      - name: Validate deployment templates
        run: python tools/validate_deployments.py

      - name: Run transformer tests
        working-directory: transformer
        run: PYTHONPATH=src python -m unittest

      - name: Run generator tests
        working-directory: generator
        run: PYTHONPATH=src python -m unittest

      - name: Run dashboard tests
        working-directory: dashboard
        run: PYTHONPATH=app python -m unittest discover -s tests

      - name: Run observability exporter tests
        run: PYTHONPATH=observability/exporter python -m unittest discover -s observability/exporter/tests

      - name: Run config validator tests
        run: PYTHONPATH=tools python -m unittest discover -s tools/tests

      - name: Validate Grafana dashboard JSON
        run: python -m json.tool observability/grafana/dashboards/omnicare-cdc.json >/dev/null

      - name: Compile Python modules
        run: |
          python -m py_compile transformer/src/omnicare_cdc/*.py
          python -m py_compile generator/src/omnicare_generator/*.py
          python -m py_compile dashboard/app/server.py
          python -m py_compile observability/exporter/server.py
          python -m py_compile tools/validate_config.py
          python -m py_compile tools/security_check.py
          python -m py_compile tools/validate_deployments.py
