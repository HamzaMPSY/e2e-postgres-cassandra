services:
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: omnicare-kafka
    ports:
      - "19092:19092"
    environment:
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://0.0.0.0:19092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 12

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    container_name: omnicare-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "18081:8081"
    environment:
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx384m"
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

  connect:
    image: quay.io/debezium/connect:2.7
    container_name: omnicare-connect
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
    ports:
      - "18083:8083"
    environment:
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: omnicare-connect
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"

  postgres-orders:
    image: postgres:16-alpine
    container_name: omnicare-postgres-orders
    ports:
      - "15432:5432"
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=10", "-c", "max_wal_senders=10"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro

  mysql-billing:
    image: mysql:8.0
    container_name: omnicare-mysql-billing
    ports:
      - "13306:3306"
    command:
      - "--server-id=223344"
      - "--log-bin=mysql-bin"
      - "--binlog-format=ROW"
      - "--binlog-row-image=FULL"
      - "--performance-schema=OFF"
      - "--innodb-buffer-pool-size=128M"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro

  mongo-engagement:
    image: mongo:7
    container_name: omnicare-mongo-engagement
    hostname: mongo-engagement
    ports:
      - "27017:27017"
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--wiredTigerCacheSizeGB", "0.25"]

  mongo-setup:
    image: mongo:7
    container_name: omnicare-mongo-setup
    depends_on:
      - mongo-engagement
    command:
      - bash
      - -lc
      - |
        for attempt in {1..30}; do
          mongosh --host mongo-engagement:27017 --eval '
            try {
              rs.status();
            } catch (error) {
              rs.initiate({_id: "rs0", members: [{_id: 0, host: "mongo-engagement:27017"}]});
            }
          ' && break
          sleep 2
        done
        for attempt in {1..30}; do
          mongosh "mongodb://mongo-engagement:27017/engagement?replicaSet=rs0" --eval '
            db.createCollection("support_tickets");
            db.support_tickets.createIndex({ ticket_id: 1 }, { unique: true });
            db.support_tickets.createIndex({ customer_id: 1, opened_at: -1 });
            db.createCollection("customer_events");
            db.customer_events.createIndex({ event_id: 1 }, { unique: true });
            db.customer_events.createIndex({ customer_id: 1, event_ts: -1 });
          ' && exit 0
          sleep 2
        done
        exit 1

  oracle-erp:
    image: gvenzl/oracle-free:23-slim
    container_name: omnicare-oracle-erp
    profiles: ["oracle"]
    ports:
      - "11521:1521"
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      APP_USER: ERP_APP
      APP_USER_PASSWORD: ${ORACLE_PASSWORD}
    volumes:
      - ./oracle/init.sql:/container-entrypoint-initdb.d/001-init.sql:ro

  cassandra:
    image: cassandra:5
    container_name: omnicare-cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: ${CASSANDRA_CLUSTER_NAME}
      CASSANDRA_DC: ${CASSANDRA_DC}
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
      JVM_EXTRA_OPTS: "-Dcassandra.skip_wait_for_gossip_to_settle=0"

  cassandra-setup:
    image: cassandra:5
    container_name: omnicare-cassandra-setup
    depends_on:
      - cassandra
    volumes:
      - ./cassandra/schema.cql:/schema.cql:ro
    command:
      - bash
      - -lc
      - |
        for attempt in {1..60}; do
          /opt/cassandra/bin/cqlsh cassandra 9042 -f /schema.cql && exit 0
          sleep 2
        done
        exit 1

  trino:
    image: trinodb/trino:462
    container_name: omnicare-trino
    depends_on:
      - cassandra-setup
    ports:
      - "18080:8080"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx768m"
    volumes:
      - ./trino/catalog:/etc/trino/catalog:ro

  dashboard:
    build:
      context: ./dashboard
    container_name: omnicare-dashboard
    depends_on:
      - trino
    ports:
      - "18090:8080"
    environment:
      TRINO_URL: http://trino:8080
      DASHBOARD_PORT: 8080
